<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/llama.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Stock Analyzer Pro</title>

    <!-- Apply saved theme BEFORE first paint to avoid flash -->
    <script>
      try {
        var t = localStorage.getItem('sa-theme')
        if (t === 'light') document.documentElement.classList.remove('dark')
        else document.documentElement.classList.add('dark')
      } catch(e) { document.documentElement.classList.add('dark') }
    </script>

    <!-- Oxanium (sans) + Share Tech Mono (mono) — futurista tech, legible, estilo Matrix -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
