<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/stock_analyzer_a/app/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Stock Analyzer Pro</title>

    <!-- Apply saved theme BEFORE first paint to avoid flash -->
    <script>
      try {
        var t = localStorage.getItem('sa-theme')
        if (t === 'light') document.documentElement.classList.remove('dark')
        else document.documentElement.classList.add('dark')
      } catch(e) { document.documentElement.classList.add('dark') }
    </script>

    <!-- Inter — variable font for crisp rendering at all weights -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/stock_analyzer_a/app/assets/index-CmbPWRHr.js"></script>
    <link rel="stylesheet" crossorigin href="/stock_analyzer_a/app/assets/index-z9CWPB9X.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
