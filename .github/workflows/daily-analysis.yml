name: Daily Market Analysis - Full Pipeline

on:
  schedule:
    # Run Monday-Friday 04:00 UTC (6:00 España verano / 5:00 invierno)
    # Margen de 3h para terminar antes de las 9:00 España
    - cron: '0 4 * * 1-5'
  workflow_dispatch:  # Manual trigger

# ══════════════════════════════════════════════════════════════════════════════
#  ARQUITECTURA DE JOBS
#
#  ┌─────────────────┐ ─────────────────────────────────────────────┐
#  │  vcp-scan       │ S&P 500 VCP (~30 min, paralelo)              │
#  │  ~30 min        │ ─▶ commit docs/reports/vcp/latest.csv        │
#  └─────────────────┘                                              │
#                                                                   ├──▶ scanners ──▶ deploy
#  ┌─────────────────┐                                              │
#  │  core-scoring   │ fundamental + integrator (lee VCP via sync)  │
#  │  ~20 min        │                                              │
#  └─────────────────┘ ─────────────────────────────────────────────┘
#
#  Beneficio: VCP (el más lento) corre en paralelo con fundamental scoring.
#  Tiempo total: max(vcp, core) en vez de vcp + core.
#  Cada job hace su propio git commit/push al terminar.
# ══════════════════════════════════════════════════════════════════════════════

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 0 — VCP Scanner (corre en PARALELO con core-scoring)
  #  S&P 500 completo (~500 tickers). Genera docs/reports/vcp/latest.csv
  #  El integrator espera a que este job y core-scoring terminen antes de fusionar.
  # ════════════════════════════════════════════════════════════════════════════
  vcp-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests beautifulsoup4 lxml scipy

      - name: VCP Scanner (S&P 500 — universo ampliado de patrones técnicos)
        run: python3 vcp_scanner_usa.py --sp500 --parallel || echo "VCP scanner failed"

      - name: Commit VCP outputs
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add docs/reports/vcp/ || true
          git diff --cached --quiet && echo "No VCP changes" || \
            git commit -m "chore(vcp): S&P500 scan - $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push && echo "VCP push OK" && break
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done || echo "VCP push failed (non-critical)"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Core scoring  (CRITICAL — si falla, re-ejecutar solo este job)
  # ════════════════════════════════════════════════════════════════════════════
  core-scoring:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Heartbeat: escribe pipeline_status.json via GitHub API al inicio ──
      # Esto garantiza que el banner muestre "corrió hoy" aunque el push final falle
      - name: Pipeline Heartbeat (API push)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc)
          status = {
            'last_run': now.strftime('%Y-%m-%dT%H:%M:%SZ'),
            'run_date': now.strftime('%Y-%m-%d'),
            'status': 'running',
            'run_id': os.environ.get('GITHUB_RUN_ID', ''),
          }
          with open('docs/pipeline_status.json', 'w') as f:
            json.dump(status, f, indent=2)
          "
          REPO="${{ github.repository }}"
          SHA=$(gh api "repos/${REPO}/contents/docs/pipeline_status.json" --jq '.sha' 2>/dev/null || echo "")
          CONTENT=$(base64 -w 0 docs/pipeline_status.json)
          DATE=$(date +%Y-%m-%d)
          if [ -n "$SHA" ]; then
            gh api "repos/${REPO}/contents/docs/pipeline_status.json" \
              --method PUT \
              -f message="chore: pipeline heartbeat ${DATE}" \
              -f content="${CONTENT}" \
              -f sha="${SHA}" \
              --silent && echo "Heartbeat pushed via API" || echo "Heartbeat push failed (non-critical)"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests beautifulsoup4 lxml
          pip install plotly matplotlib seaborn scikit-learn scipy openpyxl
          pip install groq pyyaml
          # anthropic → Claude data-check en ai_quality_filter.py (VALUE); sin él se salta en silencio
          pip install anthropic

      # ── TIER A: CRÍTICOS — deben pasar o el job falla (no continue-on-error) ──
      - name: Market Regime Detector (informational — gates signals, never aborts)
        continue-on-error: true
        run: python3 market_regime_detector.py || echo "Market regime detection failed"

      - name: Sector Rotation Scan
        continue-on-error: true
        run: python3 sector_rotation_detector.py || echo "Sector rotation failed"

      - name: Fundamental Scoring [CRITICAL]
        run: python3 fundamental_scorer.py --curated

      - name: Analyst Revisions Tracker
        continue-on-error: true
        run: python3 analyst_revisions_tracker.py || echo "Analyst revisions tracker failed"

      - name: ML Win Predictor (XGBoost win probability)
        continue-on-error: true
        run: python3 ml_win_predictor.py || echo "ML win predictor failed"

      - name: Sync VCP outputs from parallel job
        run: |
          git fetch origin main
          git checkout origin/main -- docs/reports/vcp/ 2>/dev/null && echo "VCP outputs synced" || echo "VCP sync skipped (not yet available)"

      - name: Run Super Score Integration [CRITICAL]
        run: python3 super_score_integrator.py

      # ── Enriquecimiento opcional (no bloquean el job) ──────────────────────
      - name: AI Quality Filter
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 ai_quality_filter.py || echo "AI quality filter failed"

      - name: European Insider Scanner
        continue-on-error: true
        run: python3 european_insider_scanner.py || echo "European insider scanner failed"

      - name: European Value Scanner
        continue-on-error: true
        run: python3 european_value_scanner.py --curated || echo "European scanner failed"

      - name: Global Market Scanner (BR/KR/JP/HK)
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 global_market_scanner.py --curated || echo "Global market scanner failed"

      - name: Macro Radar (Early Warning System)
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 macro_radar.py || echo "Macro radar failed"

      - name: Macro Stress Radar (commodity dislocations)
        continue-on-error: true
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python3 -m macro_stress.macro_stress_radar || echo "Macro stress radar failed"

      - name: AI Filter European Value
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 ai_quality_filter.py --european || echo "European AI filter failed"

      - name: Calculate Entry/Exit Prices (all strategies) [CRITICAL]
        run: python3 add_entry_exit_to_opportunities.py --all

      - name: Conviction Filter (final quality gate) [CRITICAL]
        run: python3 conviction_filter.py

      - name: Generate Investment Theses
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 thesis_generator.py 50 --ai || echo "Thesis generation failed"

      - name: Generate AI Insights (briefing, insiders, industry)
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 generate_insights.py || echo "AI insights generation failed"

      - name: Portfolio Tracker (record signals + update performance) [CRITICAL]
        run: python3 portfolio_tracker.py --all --backfill-alpha

      - name: Thesis Drift Monitor (alerta tesis rotas en posiciones abiertas)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Supabase → filtra el Telegram a la cartera REAL del usuario
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_MONITOR_USER_ID: ${{ secrets.SUPABASE_MONITOR_USER_ID }}
        run: python3 thesis_drift_monitor.py || echo "Thesis drift monitor failed"

      - name: Entry Verdict Agent (¿Entro hoy? per ticker)
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 entry_verdict_agent.py --llm-budget 30 || echo "Entry verdict agent failed"

      - name: Owner Earnings Batch (pre-compute for GitHub Pages)
        continue-on-error: true
        run: python3 owner_earnings.py || echo "Owner earnings batch failed"

      - name: Owner Earnings AI Validator
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 owner_earnings_validator.py || echo "Owner earnings AI validator failed"

      - name: Apply Owner Earnings AI Adjustment
        continue-on-error: true
        run: python3 apply_oe_ai_adjustment.py || echo "Owner earnings AI patch failed"

      - name: Technical Signal Analyzer
        continue-on-error: true
        run: python3 technical_signal_analyzer.py || echo "Technical signal analyzer failed"

      - name: Technical Filter (Stage 2 MA + ATR + Volume)
        continue-on-error: true
        run: python3 technical_filter.py || echo "Technical filter failed"

      - name: Pattern Detector (VCP + TA-Lib candlesticks)
        continue-on-error: true
        run: pip install TA-Lib 2>/dev/null || true; python3 pattern_detector.py || echo "Pattern detector failed"

      - name: Chart Analyzer (Groq Vision — Llama 4)
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pip install mplfinance 2>/dev/null || true; python3 chart_analyzer.py --batch || echo "Chart analyzer failed"

      # ── Commit core outputs para que scanners los lea en su checkout ────────
      - name: Commit Core Outputs
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

          git add docs/*.json docs/*.csv || true
          git add docs/portfolio_tracker/ docs/theses.json || true
          git add data/ || true
          # Excluir app/ y status files (status va por GitHub API)
          git reset HEAD -- docs/app/ 2>/dev/null || true
          git reset HEAD -- docs/pipeline_status.json docs/pipeline_health.json 2>/dev/null || true

          SCAN_DATE=$(date +%Y-%m-%d)
          git diff --cached --quiet && echo "No core changes to commit" || \
            git commit -m "chore(core): scoring + AI outputs - ${SCAN_DATE}"

          push_with_retry() {
            for i in 1 2 3; do
              git fetch origin main
              git stash --include-untracked 2>/dev/null || true
              git rebase origin/main && git push && echo "Push OK (attempt $i)" && return 0
              git rebase --abort 2>/dev/null || true
              echo "Attempt $i failed, retrying..."
              sleep $((i * 5))
            done
            echo "All push attempts failed — data committed locally but not pushed"
            return 1
          }
          push_with_retry || true


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Scanners opcionales + alertas + commit
  # Corre siempre (if: always). El checkout recibe los outputs de core-scoring.
  # ════════════════════════════════════════════════════════════════════════════
  scanners:
    needs: core-scoring
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository (includes core-scoring outputs)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests beautifulsoup4 lxml
          pip install plotly matplotlib seaborn scikit-learn scipy openpyxl
          pip install groq pyyaml
          # anthropic → Claude Sonnet en cerebro.py (exit validation + daily plan); sin él cae siempre al fallback Groq
          pip install anthropic

      - name: Bond Scanner (ETF + corporate bond opportunities)
        continue-on-error: true
        run: python3 bond_scanner.py || echo "Bond scanner failed"

      - name: Commodity Scanner (ETF materias primas)
        continue-on-error: true
        run: python3 commodity_scanner.py || echo "Commodity scanner failed"

      - name: Check Price Alerts (send emails via Resend)
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 check_alerts.py || echo "Alert checker failed"

      - name: Recurring Insiders
        continue-on-error: true
        run: python3 analyze_recurring_insiders.py || echo "Recurring insiders failed"

      - name: Backtest Engine
        continue-on-error: true
        run: python3 backtest_engine.py || echo "Backtest engine failed"

      - name: Position Sizing
        continue-on-error: true
        run: python3 position_sizer.py || echo "Position sizing failed"

      - name: Earnings Calendar
        continue-on-error: true
        run: python3 earnings_calendar.py || echo "Earnings calendar failed"

      - name: Earnings Thesis Generator
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_MONITOR_USER_ID: ${{ secrets.SUPABASE_MONITOR_USER_ID }}
        run: python3 earnings_thesis_generator.py || echo "Earnings thesis generation failed"

      - name: Mean Reversion
        continue-on-error: true
        run: |
          python3 mean_reversion_detector.py || echo "Mean reversion detector failed"
          python3 mean_reversion_backtester.py || echo "Mean reversion backtest failed"

      - name: Bounce Scanner (Universo Ampliado — SP500 minus curated)
        continue-on-error: true
        run: python3 bounce_scanner_broad.py || echo "Bounce scanner broad failed"

      - name: Bounce Alerts (Telegram si hay setup — es raro, ~1/semana)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 bounce_alerts.py || echo "Bounce alerts failed"

      - name: Macro Country Scanner
        continue-on-error: true
        run: python3 macro_country_scanner.py || echo "Macro country scanner failed"

      - name: Economic Calendar (FOMC/CPI/NFP schedule)
        continue-on-error: true
        run: python3 economic_calendar_generator.py || echo "Economic calendar generation failed"

      - name: Catalyst Scanner
        continue-on-error: true
        run: python3 catalyst_scanner.py || echo "Catalyst scanner failed"

      - name: Portfolio News Monitor
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_MONITOR_USER_ID: ${{ secrets.SUPABASE_MONITOR_USER_ID }}
        run: python3 portfolio_news_monitor.py || echo "Portfolio news monitor failed"

      - name: Strategy Agent (per-position trim/add plan via Groq)
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_MONITOR_USER_ID: ${{ secrets.SUPABASE_MONITOR_USER_ID }}
        run: python3 strategy_agent.py || echo "Strategy agent failed"

      - name: Earnings Options Snapshot (straddle, skew, beat history per position)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_MONITOR_USER_ID: ${{ secrets.SUPABASE_MONITOR_USER_ID }}
        run: python3 earnings_options_snapshot.py || echo "Earnings options snapshot failed"

      - name: Strategy Alerts (trim/add level crossings to Telegram)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 strategy_alerts.py || echo "Strategy alerts failed"

      - name: Options Flow Detector
        continue-on-error: true
        run: python3 options_flow_detector.py || echo "Options flow detector failed"

      # LEAPS se analiza en su propio workflow (leaps-scan.yml) en horario de
      # mercado USA — de madrugada las opciones largas no tienen bid/ask.

      - name: New VALUE Picks Alert
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 new_value_alerts.py || echo "New value alerts failed"

      - name: Cerebro — Proactive AI Agent
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 cerebro.py || echo "Cerebro failed"

      - name: Dividend Trap Scanner
        continue-on-error: true
        run: python3 dividend_trap_scanner.py || echo "Dividend trap scanner failed"

      - name: Contrarian Discovery — quality companies cheap by circumstance
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 contrarian_discovery.py || echo "Contrarian discovery failed"

      - name: Score Drift Detector — novedades vs ayer
        continue-on-error: true
        run: python3 score_drift_detector.py || echo "Score drift detection failed"

      - name: Portfolio price alerts
        continue-on-error: true
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 portfolio_price_alerts.py || echo "Portfolio price alerts failed"

      # ── Archive + status ───────────────────────────────────────────────────
      - name: Archive daily CSV snapshot
        if: always()
        run: |
          SCAN_DATE=$(date +%Y-%m-%d)
          ARCHIVE_DIR="docs/history/${SCAN_DATE}"
          mkdir -p "${ARCHIVE_DIR}"

          for f in \
            docs/value_opportunities.csv \
            docs/european_value_opportunities.csv \
            docs/global_value_opportunities.csv \
            docs/mean_reversion_opportunities.csv \
            docs/bounce_setups_broad.csv \
            docs/bounce_setups_broad.json \
            docs/portfolio_strategies.csv \
            docs/portfolio_strategies.json \
            docs/earnings_options.json \
            docs/.strategy_alerts_seen.json \
            docs/recurring_insiders.csv \
            docs/eu_recurring_insiders.csv \
            docs/momentum_opportunities.csv \
            docs/fundamental_scores.csv \
            docs/options_flow.csv \
            docs/macro_radar.json \
            docs/macro_stress.json \
            docs/dividend_traps.json \
            docs/earnings_theses.json \
            docs/owner_earnings_ai_validated.json \
            docs/owner_earnings_ai_validated.csv \
            docs/cerebro_insights.json \
            docs/cerebro_convergence.json \
            docs/cerebro_alerts.json \
            docs/cerebro_calibration.json \
            docs/cerebro_entry_signals.json \
            docs/cerebro_exit_signals.json \
            docs/cerebro_value_traps.json \
            docs/cerebro_smart_money.json \
            docs/cerebro_insider_clusters.json \
            docs/cerebro_dividend_safety.json \
            docs/cerebro_piotroski.json \
            docs/cerebro_stress_test.json \
            docs/cerebro_briefing.json \
            docs/cerebro_short_squeeze.json \
            docs/cerebro_quality_decay.json \
            docs/cerebro_sector_rv.json \
            docs/cerebro_daily_plan.json \
            docs/cerebro_earnings_revisions.json \
            docs/cerebro_regime_transition.json \
            docs/cerebro_thesis_drift.json \
            docs/cerebro_correlation_breakdown.json \
            docs/cerebro_competitor_displacement.json \
            docs/cerebro_options_quality.json \
            docs/cerebro_ticker_signals.csv; do
            [ -f "$f" ] && cp "$f" "${ARCHIVE_DIR}/" && echo "Archived: $f"
          done

          python3 -c "
          import os, shutil
          from datetime import datetime, timedelta
          history_dir = 'docs/history'
          if not os.path.isdir(history_dir): exit()
          cutoff = (datetime.now() - timedelta(days=45)).strftime('%Y-%m-%d')
          for d in sorted(os.listdir(history_dir)):
              if d < cutoff and os.path.isdir(os.path.join(history_dir, d)):
                  shutil.rmtree(os.path.join(history_dir, d))
                  print(f'Pruned old snapshot: {d}')
          " || echo "Prune step skipped"

          python3 -c "
          import os, json
          from datetime import datetime
          history_dir = 'docs/history'
          snapshots = []
          if os.path.isdir(history_dir):
              for d in sorted(os.listdir(history_dir), reverse=True):
                  full = os.path.join(history_dir, d)
                  if os.path.isdir(full):
                      files = [f for f in os.listdir(full) if f.endswith('.csv')]
                      if files:
                          snapshots.append({'date': d, 'files': sorted(files)})
          index = {'updated': datetime.now().strftime('%Y-%m-%d'), 'snapshots': snapshots}
          with open('docs/history/index.json', 'w') as fh:
              json.dump(index, fh, indent=2)
          print(f'History index: {len(snapshots)} snapshots')
          " || echo "History index failed"

      - name: Write Pipeline Status + Health Report
        if: always()
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timezone, date, timedelta

          NOW_UTC = datetime.now(timezone.utc)
          NOW_STR = NOW_UTC.strftime('%Y-%m-%dT%H:%M:%SZ')
          TODAY   = NOW_UTC.strftime('%Y-%m-%d')

          status = {
            'last_run': NOW_STR,
            'run_date': TODAY,
            'status':   'completed',
            'run_id':   os.environ.get('GITHUB_RUN_ID', ''),
          }
          with open('docs/pipeline_status.json', 'w') as f:
              json.dump(status, f, indent=2)

          # Module → (file_path, json_date_key_or_None, min_rows_or_None, stale_threshold_days)
          # stale_threshold: how many days old before status flips to 'stale' (ok if <= threshold)
          MODULES = {
            'value_us':       ('docs/value_opportunities.csv',                  None, 20, 2),
            'value_eu':       ('docs/european_value_opportunities.csv',          None, 10, 3),
            'value_global':   ('docs/global_value_opportunities.csv',            None,  5, 3),
            'fundamental':    ('docs/fundamental_scores.csv',                    None, 50, 2),
            'technical':      ('docs/technical_signals_summary.csv',             None, 30, 2),
            'cerebro':        ('docs/cerebro_briefing.json',                     'generated_at', None, 3),
            'mean_reversion': ('docs/mean_reversion_opportunities.json',         'generated_at', None, 3),
            'macro':          ('docs/macro_radar.json',                          'date',         None, 2),
            'insiders':       ('docs/recurring_insiders.csv',                    None,  5, 3),
            'portfolio':      ('docs/portfolio_tracker/recommendations.csv',     None,  1, 2),
            'earnings':       ('docs/tikr_earnings_data.json',                   'generated_at', None, 7),
            'theses':         ('docs/theses.json',                                None,  None, 7),
            'catalysts':      ('docs/catalysts.json',                            'generated_at', None, 7),
            'economic_cal':   ('docs/economic_calendar.json',                    'generated_at', None, 7),
            'options_flow':   ('docs/options_flow.csv',                          None,  1, 3),
            'bounce_broad':   ('docs/bounce_setups_broad.json',                  'generated_at', None, 3),
            'strategies':     ('docs/portfolio_strategies.json',                 'generated_at', None, 3),
            'earnings_opts':  ('docs/earnings_options.json',                     'generated_at', None, 3),
          }

          def _csv_rows(path):
              try:
                  with open(path) as fh:
                      n = sum(1 for _ in fh) - 1  # minus header
                  return max(0, n)
              except Exception:
                  return None

          modules = {}
          ok_count = 0
          for name, (path, date_key, min_rows, stale_days) in MODULES.items():
              if not os.path.exists(path):
                  modules[name] = {'status': 'missing', 'date': None}
                  continue
              file_date = None
              if path.endswith('.json') and date_key:
                  try:
                      with open(path) as fh:
                          d = json.load(fh)
                      if isinstance(d, dict):
                          v = d.get(date_key)
                          if v: file_date = str(v)[:10]
                  except Exception:
                      pass
              if not file_date:
                  from datetime import datetime as dt
                  file_date = dt.fromtimestamp(os.path.getmtime(path)).strftime('%Y-%m-%d')
              days_ago = (NOW_UTC.date() - date(*(int(x) for x in file_date.split('-')))).days

              row_count = _csv_rows(path) if path.endswith('.csv') else None
              too_few = (min_rows is not None and row_count is not None and row_count < min_rows)

              if too_few:
                  module_status = 'empty'
              elif days_ago <= stale_days:
                  module_status = 'ok'
                  ok_count += 1
              else:
                  module_status = 'stale'

              entry = {'status': module_status, 'date': file_date, 'days_ago': days_ago,
                       'stale_threshold_days': stale_days}
              if row_count is not None:
                  entry['rows'] = row_count
                  if min_rows is not None:
                      entry['min_rows'] = min_rows
              modules[name] = entry

          health = {
            'generated_at': NOW_STR,
            'pipeline_date': TODAY,
            'ok_count': ok_count,
            'total': len(MODULES),
            'modules': modules,
          }
          with open('docs/pipeline_health.json', 'w') as f:
              json.dump(health, f, indent=2)

          print(f'Pipeline health: {ok_count}/{len(MODULES)} modules fresh today')
          for n, m in modules.items():
              icon = 'ok' if m['status'] == 'ok' else ('!' if m['status'] == 'stale' else 'x')
              print(f'  [{icon}] {n}: {m[\"status\"]} ({m[\"date\"]})')
          "

      # ── Push status files via GitHub API (immune a fallos de git push) ────
      # Estos dos archivos son los que controlan el banner de la app.
      # El push via API nunca falla por conflictos de git con sesiones de dev.
      - name: Push Status Files via GitHub API
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          DATE=$(date +%Y-%m-%d)
          for FILE in docs/pipeline_status.json docs/pipeline_health.json; do
            [ -f "$FILE" ] || continue
            SHA=$(gh api "repos/${REPO}/contents/${FILE}" --jq '.sha' 2>/dev/null || echo "")
            [ -z "$SHA" ] && echo "Cannot find SHA for $FILE, skipping" && continue
            CONTENT=$(base64 -w 0 "$FILE")
            gh api "repos/${REPO}/contents/${FILE}" \
              --method PUT \
              -f message="chore: pipeline status ${DATE}" \
              -f content="${CONTENT}" \
              -f sha="${SHA}" \
              --silent \
              && echo "API push OK: $FILE" \
              || echo "API push failed for $FILE (non-critical)"
          done

      - name: Commit and Push Scanner Outputs
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

          git add docs/*.json docs/*.csv || true
          git add docs/history/ docs/portfolio_tracker/ docs/theses.json || true
          git add data/ || true
          # Excluir app/ y status files (estos van por GitHub API, no por git push)
          git reset HEAD -- docs/app/ 2>/dev/null || true
          git reset HEAD -- docs/pipeline_status.json docs/pipeline_health.json 2>/dev/null || true

          SCAN_DATE=$(date +%Y-%m-%d)
          git diff --cached --quiet && echo "No scanner changes to commit" || \
            git commit -m "chore(scanners): daily scanner outputs - ${SCAN_DATE}"

          push_with_retry() {
            for i in 1 2 3; do
              git fetch origin main
              git stash --include-untracked 2>/dev/null || true
              git rebase origin/main && git push && echo "Push OK (attempt $i)" && return 0
              git rebase --abort 2>/dev/null || true
              echo "Attempt $i failed, retrying..."
              sleep $((i * 5))
            done
            echo "All push attempts failed — data committed locally but not pushed"
            return 1
          }
          push_with_retry || true


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — GitHub Pages deploy (siempre, tras los dos jobs anteriores)
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    needs: [vcp-scan, core-scoring, scanners]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Trigger GitHub Pages Deployment
        run: gh workflow run pages-deploy.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

env:
  PYTHONUNBUFFERED: 1
