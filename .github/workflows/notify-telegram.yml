name: Notify Telegram

# Manda un mensaje puntual al grupo de Telegram. Útil para avisos manuales
# ("he terminado tal cosa") sin exponer el token fuera de CI.
on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Texto del mensaje (admite HTML de Telegram)'
        required: true
        default: 'Aviso desde Stock Analyzer'

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: sendMessage
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG: ${{ github.event.inputs.message }}
        run: |
          curl -s "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}" | head -c 400
          echo ""
