name: Intraday Bounce Scanner

on:
  # PAUSADO: cada 30 min en horario mercado
  # schedule:
  #  # Cada 30 min Lun-Vie 13:30-20:30 UTC (9:30am-4:30pm ET)
  #  - cron: '*/30 13-20 * * 1-5'
  workflow_dispatch:  # Trigger manual para testing

jobs:
  bounce-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install pandas numpy yfinance requests

      - name: Run Bounce Scanner
        id: bounce
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 intraday_bounce_scanner.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run Unusual Flow Scanner
        id: flow
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 unusual_flow_scanner.py --quick

      - name: Financial Agent — conflict alerts
        if: steps.flow.outcome == 'success'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: python3 financial_agent.py --flow-only

      - name: Position Monitor
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: python3 position_monitor.py

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "GitHub Actions Bot"
          git add docs/intraday_bounce_alerts.json docs/unusual_flow.json docs/unusual_flow.csv 2>/dev/null || true
          git diff --cached --quiet && echo "Sin cambios" && exit 0
          TIMESTAMP=$(date -u +"%H:%M UTC")
          git commit -m "chore: intraday scan — ${TIMESTAMP}"
          git fetch origin main && git rebase origin/main && git push || \
          (git rebase --abort 2>/dev/null || true; git fetch origin main && git rebase origin/main && git push) || \
          echo "Push failed after retry (concurrent update)"

env:
  PYTHONUNBUFFERED: 1
