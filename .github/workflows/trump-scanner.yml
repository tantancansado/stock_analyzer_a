name: Trump Stock Scanner

on:
  schedule:
    # Cada 2h durante mercado US (13:00–22:00 UTC = 09:00–18:00 ET)
    - cron: '0 13,15,17,19,21 * * 1-5'
  workflow_dispatch:
    inputs:
      show_recent:
        description: 'Show recent signals (yes/no)'
        default: 'no'

jobs:
  scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests feedparser yfinance groq

      - name: Run Trump Stock Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.show_recent }}" = "yes" ]; then
            python3 trump_stock_scanner.py show
          else
            python3 trump_stock_scanner.py
          fi

      - name: Save signals to docs
        if: always()
        run: |
          if [ -f docs/trump_signals.json ]; then
            echo "Signals file present:"
            python3 -c "import json; d=json.load(open('docs/trump_signals.json')); print(f'  {len(d)} total signals')"
          fi

      - name: Commit updated signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/trump_signals.json docs/.trump_seen_hashes.json || true
          git diff --cached --quiet || git commit -m "chore: update trump signals [skip ci]"
          git push || true
