name: Political Scanner

on:
  schedule:
    # Una vez al día a las 14:00 UTC (10:00 ET — mercado abierto, datos frescos)
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      show_recent:
        description: 'Show recent signals (yes/no)'
        default: 'no'

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests yfinance groq

      - name: Run Political Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.show_recent }}" = "yes" ]; then
            python3 political_scanner.py show
          else
            python3 political_scanner.py
          fi

      - name: Report signal count
        if: always()
        run: |
          if [ -f docs/political_signals.json ]; then
            python3 -c "
          import json
          d = json.load(open('docs/political_signals.json'))
          by_type = {}
          for s in d:
              k = s.get('source_type', 'UNKNOWN')
              by_type[k] = by_type.get(k, 0) + 1
          print(f'Total: {len(d)} signals')
          for k, v in sorted(by_type.items()):
              print(f'  {k}: {v}')
          "
          fi

      - name: Commit updated signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/political_signals.json docs/.political_seen_hashes.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update political signals [skip ci]"
          git push || true
