name: LEAPS Scan

on:
  schedule:
    # 15:00 UTC = 11:00 ET — mercado USA abierto, opciones con bid/ask reales.
    # (El pipeline diario corre de madrugada ET, cuando los LEAPS no tienen bid.)
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

# Evita solapes si un run tarda más de lo previsto
concurrency:
  group: leaps-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        # anthropic → narrativa de Claude (claude_chat); sin él se salta en silencio
        run: pip install -r requirements.txt

      - name: Run LEAPS Analyzer (mercado abierto)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 leaps_analyzer.py

      - name: Run LEAPS Monitor (posiciones guardadas → alertas Telegram)
        continue-on-error: true
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_MONITOR_USER_ID:  ${{ secrets.SUPABASE_MONITOR_USER_ID }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 leaps_monitor.py || echo "LEAPS monitor failed"

      - name: Commit LEAPS outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Cada add por separado: si un fichero no existe (p.ej. sin alertas),
          # no debe abortar el add de los demás.
          git add docs/leaps_opportunities.json || true
          git add docs/leaps_positions_status.json 2>/dev/null || true
          git add docs/.leaps_alerts_sent.json 2>/dev/null || true
          # Commit ANTES de pull para no perder cambios en el autostash
          git diff --cached --quiet || git commit -m "chore: LEAPS scan + monitor $(date -u +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push || true
