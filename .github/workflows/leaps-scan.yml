name: LEAPS Scan

on:
  schedule:
    # 15:00 UTC = 11:00 ET — mercado USA abierto, opciones con bid/ask reales.
    # (El pipeline diario corre de madrugada ET, cuando los LEAPS no tienen bid.)
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

# Evita solapes si un run tarda más de lo previsto
concurrency:
  group: leaps-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        # anthropic → narrativa de Claude (claude_chat); sin él se salta en silencio
        run: pip install pandas numpy scipy yfinance requests anthropic

      - name: Run LEAPS Analyzer (mercado abierto)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 leaps_analyzer.py

      - name: Commit LEAPS opportunities
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add docs/leaps_opportunities.json
          git diff --cached --quiet || git commit -m "chore: LEAPS scan $(date -u +%Y-%m-%d)"
          git push || true
