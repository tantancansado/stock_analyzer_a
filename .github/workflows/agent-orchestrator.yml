name: System Health Monitor

on:
  # PAUSADO: health checks 3x/día
  # schedule:
  #  # Corre a las 9, 15, 21 UTC (después del pipeline diario a las 5:23)
  #  - cron: '0 9,15,21 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Enviar resumen aunque todo esté OK'
        required: false
        default: 'false'
      status_only:
        description: 'Solo métricas, sin Telegram'
        required: false
        default: 'false'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run System Health Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:        ${{ github.repository }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FLAGS="$FLAGS --force"
          fi
          if [ "${{ github.event.inputs.status_only }}" = "true" ]; then
            FLAGS="$FLAGS --status"
          fi
          python3 agent_orchestrator.py $FLAGS

      - name: Save log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-log-${{ github.run_id }}
          path: docs/agent_orchestrator_log.json
          if-no-files-found: ignore
